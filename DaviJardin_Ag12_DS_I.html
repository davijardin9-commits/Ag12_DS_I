<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus sites favoritos</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            text-align: center;
        }

        h1{
            color: #333;
        }

        .site{
            background-color: white;
            margin: 20px auto;
            padding: 20px;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        img{
            width: 250px;
            height: 150px;
            border-radius: 10px;
        }

        a{
            text-decoration: none;
            color: blue;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>Meus sites favoritos: Davi Jardin</h1>

    <div class="site">
        <h2>YouTube</h2>

        <a href="https://www.youtube.com" target="_blank">
            <img src="youtube.jpg" alt="YouTube">
        </a>

        <p>
            <a href="https://www.youtube.com" target="_blank">
                Acessar YouTube
            </a>
        </p>
    </div>

    <div class="site">
        <h2>Instagram</h2>

        <a href="https://www.instagram.com" target="_blank">

        </a>

        <p>
            <a href="https://www.instagram.com" target="_blank">
                Acessar Instagram
            </a>
        </p>
    </div>

    <div class="site">
        <h2>GitHub</h2>

        <a href="https://github.com" target="_blank">

        </a>

        <p>
            <a href="https://github.com" target="_blank">
                Acessar GitHub
            </a>
        </p>

    <div class="site">

        </a>

        <p>
            <a href="https://www.netflix.com" target="_blank">
                Acessar Netflix
            </a>
        </p>
    </div>

    <div class="site">
        <h2>ChatGPT</h2>

        <a href="https://chatgpt.com" target="_blank">
            <img src="chatgpt.jpg" alt="ChatGPT">
        </a>

        <p>
            <a href="https://chatgpt.com" target="_blank">
                Acessar ChatGPT

</html>
